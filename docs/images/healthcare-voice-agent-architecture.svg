<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="'Segoe UI', 'SF Pro Display', system-ui, sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="pipecatGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="mcpGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="emrGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
    <linearGradient id="authGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.03"/>
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glowBlue">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#3b82f6" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700" letter-spacing="0.5">Healthcare Voice Agent — System Architecture</text>
  <text x="450" y="62" text-anchor="middle" fill="#94a3b8" font-size="11" letter-spacing="0.3">PipeCat · Claude · LangCare MCP FHIR · Fly.io</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LAYER 1: CLIENT -->
  <!-- ═══════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="60" y="82" width="780" height="72" rx="8" fill="#1e293b" stroke="url(#clientGrad)" stroke-width="1.5"/>
  </g>
  <rect x="60" y="82" width="5" height="72" rx="2" fill="url(#clientGrad)"/>
  <text x="82" y="103" fill="#60a5fa" font-size="10" font-weight="600" letter-spacing="1.2" text-transform="uppercase">LAYER 1 — CLIENT</text>

  <!-- Client icons -->
  <g transform="translate(100, 116)">
    <!-- Browser -->
    <rect x="0" y="0" width="100" height="28" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
    <text x="50" y="18" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="500">🌐 WebRTC</text>
  </g>
  <g transform="translate(220, 116)">
    <!-- Phone -->
    <rect x="0" y="0" width="100" height="28" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
    <text x="50" y="18" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="500">📞 Phone/SIP</text>
  </g>
  <g transform="translate(340, 116)">
    <!-- Mobile -->
    <rect x="0" y="0" width="100" height="28" rx="5" fill="#1e3a5f" stroke="#3b82f6" stroke-width="0.8"/>
    <text x="50" y="18" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="500">📱 Mobile App</text>
  </g>

  <!-- Auth Layer 0 badge -->
  <rect x="530" y="108" width="290" height="36" rx="6" fill="url(#authGrad)" stroke="#f59e0b" stroke-width="0.6" stroke-dasharray="3,3"/>
  <text x="545" y="122" fill="#fbbf24" font-size="9" font-weight="600" letter-spacing="0.5">AUTH LAYER 0</text>
  <text x="545" y="136" fill="#94a3b8" font-size="9">SSO / OAuth / Biometric / IVR → Patient FHIR ID</text>

  <!-- Arrow 1→2 -->
  <line x1="450" y1="154" x2="450" y2="176" stroke="#475569" stroke-width="1.5"/>
  <polygon points="444,173 450,182 456,173" fill="#475569"/>
  <text x="462" y="170" fill="#64748b" font-size="8">Audio Stream + Patient Context</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LAYER 2: PIPECAT VOICE PIPELINE -->
  <!-- ═══════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="60" y="184" width="780" height="100" rx="8" fill="#1e293b" stroke="url(#pipecatGrad)" stroke-width="1.5"/>
  </g>
  <rect x="60" y="184" width="5" height="100" rx="2" fill="url(#pipecatGrad)"/>
  <text x="82" y="205" fill="#a78bfa" font-size="10" font-weight="600" letter-spacing="1.2">LAYER 2 — VOICE PIPELINE (PipeCat Cloud / Daily.co)</text>

  <!-- STT Box -->
  <rect x="95" y="218" width="130" height="50" rx="6" fill="#2d1f5e" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="160" y="238" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">DeepGram</text>
  <text x="160" y="254" text-anchor="middle" fill="#8b8bb5" font-size="9">STT</text>

  <!-- Arrow STT → PipeCat -->
  <line x1="225" y1="243" x2="260" y2="243" stroke="#7c3aed" stroke-width="1.2"/>
  <polygon points="257,239 265,243 257,247" fill="#7c3aed"/>

  <!-- PipeCat Agent Box -->
  <rect x="265" y="218" width="215" height="50" rx="6" fill="#2d1f5e" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="372" y="236" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">PipeCat Agent</text>
  <text x="372" y="252" text-anchor="middle" fill="#8b8bb5" font-size="8.5">VAD · Turn-Taking · Context Aggregation</text>

  <!-- Arrow PipeCat → TTS -->
  <line x1="480" y1="243" x2="515" y2="243" stroke="#7c3aed" stroke-width="1.2"/>
  <polygon points="512,239 520,243 512,247" fill="#7c3aed"/>

  <!-- TTS Box -->
  <rect x="520" y="218" width="130" height="50" rx="6" fill="#2d1f5e" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="585" y="238" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Cartesia</text>
  <text x="585" y="254" text-anchor="middle" fill="#8b8bb5" font-size="9">TTS</text>

  <!-- Latency badge -->
  <rect x="688" y="228" width="130" height="28" rx="14" fill="#1a1235" stroke="#7c3aed" stroke-width="0.6"/>
  <text x="753" y="246" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">⚡ &lt; 3s end-to-end</text>

  <!-- Arrow 2→3 -->
  <line x1="372" y1="284" x2="372" y2="308" stroke="#475569" stroke-width="1.5"/>
  <polygon points="366,305 372,314 378,305" fill="#475569"/>
  <text x="384" y="300" fill="#64748b" font-size="8">Text + Tool Calls (Anthropic API)</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LAYER 3: CLAUDE LLM -->
  <!-- ═══════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="60" y="316" width="780" height="80" rx="8" fill="#1e293b" stroke="url(#claudeGrad)" stroke-width="1.5"/>
  </g>
  <rect x="60" y="316" width="5" height="80" rx="2" fill="url(#claudeGrad)"/>
  <text x="82" y="337" fill="#fbbf24" font-size="10" font-weight="600" letter-spacing="1.2">LAYER 3 — LLM (Claude / Anthropic)</text>

  <!-- Claude capabilities -->
  <rect x="95" y="348" width="135" height="34" rx="5" fill="#3d2b0a" stroke="#d97706" stroke-width="0.6"/>
  <text x="162" y="369" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="500">🧠 Clinical Reasoning</text>

  <rect x="245" y="348" width="115" height="34" rx="5" fill="#3d2b0a" stroke="#d97706" stroke-width="0.6"/>
  <text x="302" y="369" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="500">🔧 Tool Calling</text>

  <rect x="375" y="348" width="105" height="34" rx="5" fill="#3d2b0a" stroke="#d97706" stroke-width="0.6"/>
  <text x="427" y="369" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="500">⚡ Streaming</text>

  <rect x="495" y="348" width="135" height="34" rx="5" fill="#3d2b0a" stroke="#d97706" stroke-width="0.6"/>
  <text x="562" y="369" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="500">💾 Prompt Caching</text>

  <rect x="645" y="348" width="175" height="34" rx="5" fill="#3d2b0a" stroke="#d97706" stroke-width="0.6"/>
  <text x="732" y="369" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="500">🏥 Health Record Q&amp;A</text>

  <!-- Arrow 3→4 -->
  <line x1="450" y1="396" x2="450" y2="420" stroke="#475569" stroke-width="1.5"/>
  <polygon points="444,417 450,426 456,417" fill="#475569"/>

  <!-- Auth Layer 1 badge on arrow -->
  <rect x="466" y="398" width="220" height="22" rx="4" fill="url(#authGrad)" stroke="#f59e0b" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="476" y="413" fill="#fbbf24" font-size="8" font-weight="600">AUTH 1</text>
  <text x="516" y="413" fill="#94a3b8" font-size="8">MCP over Streamable HTTP + Bearer Token</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LAYER 4: LANGCARE MCP SERVER -->
  <!-- ═══════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="60" y="428" width="780" height="100" rx="8" fill="#1e293b" stroke="url(#mcpGrad)" stroke-width="1.5"/>
  </g>
  <rect x="60" y="428" width="5" height="100" rx="2" fill="url(#mcpGrad)"/>
  <text x="82" y="449" fill="#34d399" font-size="10" font-weight="600" letter-spacing="1.2">LAYER 4 — MCP SERVER (LangCare on Fly.io)</text>

  <!-- Server label -->
  <text x="95" y="472" fill="#6ee7b7" font-size="10" font-weight="500">LangCare MCP FHIR Server (Go, Stateless)</text>

  <!-- 4 FHIR Tools -->
  <rect x="95" y="480" width="140" height="34" rx="5" fill="#0a3d2b" stroke="#059669" stroke-width="0.8"/>
  <text x="165" y="501" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">fhir_read</text>

  <rect x="250" y="480" width="140" height="34" rx="5" fill="#0a3d2b" stroke="#059669" stroke-width="0.8"/>
  <text x="320" y="501" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">fhir_search</text>

  <rect x="405" y="480" width="140" height="34" rx="5" fill="#0a3d2b" stroke="#059669" stroke-width="0.8"/>
  <text x="475" y="501" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">fhir_create</text>

  <rect x="560" y="480" width="140" height="34" rx="5" fill="#0a3d2b" stroke="#059669" stroke-width="0.8"/>
  <text x="630" y="501" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">fhir_update</text>

  <!-- Zero PHI badge -->
  <rect x="720" y="462" width="105" height="22" rx="11" fill="#0a3d2b" stroke="#059669" stroke-width="0.5"/>
  <text x="772" y="477" text-anchor="middle" fill="#34d399" font-size="8" font-weight="600">🔒 Zero PHI Storage</text>

  <!-- Arrow 4→5 -->
  <line x1="450" y1="528" x2="450" y2="552" stroke="#475569" stroke-width="1.5"/>
  <polygon points="444,549 450,558 456,549" fill="#475569"/>

  <!-- Auth Layer 2 badge on arrow -->
  <rect x="466" y="530" width="240" height="22" rx="4" fill="url(#authGrad)" stroke="#f59e0b" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="476" y="545" fill="#fbbf24" font-size="8" font-weight="600">AUTH 2</text>
  <text x="516" y="545" fill="#94a3b8" font-size="8">FHIR R4 REST + OAuth2 / SMART on FHIR</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- LAYER 5: EMR SYSTEMS -->
  <!-- ═══════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="60" y="560" width="780" height="72" rx="8" fill="#1e293b" stroke="url(#emrGrad)" stroke-width="1.5"/>
  </g>
  <rect x="60" y="560" width="5" height="72" rx="2" fill="url(#emrGrad)"/>
  <text x="82" y="581" fill="#fca5a5" font-size="10" font-weight="600" letter-spacing="1.2">LAYER 5 — EMR SYSTEMS</text>

  <!-- EMR boxes -->
  <rect x="95" y="592" width="155" height="30" rx="5" fill="#3b1111" stroke="#dc2626" stroke-width="0.7"/>
  <text x="172" y="611" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="500">Epic FHIR R4</text>

  <rect x="270" y="592" width="195" height="30" rx="5" fill="#3b1111" stroke="#dc2626" stroke-width="0.7"/>
  <text x="367" y="611" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="500">Cerner (Oracle Health)</text>

  <rect x="485" y="592" width="195" height="30" rx="5" fill="#3b1111" stroke="#dc2626" stroke-width="0.7"/>
  <text x="582" y="611" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="500">GCP Healthcare API</text>

  <rect x="700" y="592" width="125" height="30" rx="5" fill="#3b1111" stroke="#dc2626" stroke-width="0.7"/>
  <text x="762" y="611" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="500">HAPI FHIR</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- FOOTER -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="60" y1="652" x2="840" y2="652" stroke="#334155" stroke-width="0.5"/>

  <!-- Tech stack summary -->
  <text x="60" y="674" fill="#64748b" font-size="9" font-weight="500" letter-spacing="0.3">STACK</text>
  <text x="100" y="674" fill="#94a3b8" font-size="9">PipeCat Cloud · DeepGram STT · Claude (Anthropic) · Cartesia TTS · LangCare MCP (Go) · Fly.io · FHIR R4</text>

  <text x="60" y="694" fill="#64748b" font-size="9" font-weight="500" letter-spacing="0.3">AUTH</text>
  <text x="100" y="694" fill="#94a3b8" font-size="9">Layer 0: SSO/OAuth/IVR → Layer 1: Bearer Token → Layer 2: OAuth2/SMART on FHIR (HIPAA)</text>

  <!-- Open source badge -->
  <rect x="710" y="662" width="130" height="26" rx="13" fill="#0f172a" stroke="#475569" stroke-width="0.8"/>
  <text x="775" y="679" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="500">🔓 Open Source (MIT)</text>
</svg>
