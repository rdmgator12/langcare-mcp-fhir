# LangCare MCP FHIR Server Configuration for OpenEMR FHIR API
#
# OpenEMR uses SMART on FHIR Backend Services authentication:
#   - Confidential client with private_key_jwt
#   - JWT assertion signed with RS384
#   - System-level scopes only (system/Resource.read|write)
#   - Access tokens are short-lived (60 seconds), no refresh tokens
#
# Setup steps (see https://github.com/openemr/openemr/blob/master/API_README.md):
#   1. Generate an RSA key pair:
#        openssl genrsa -out keys/openemr/private.key 4096
#        openssl rsa -in keys/openemr/private.key -pubout -out keys/openemr/public.pem
#   2. Convert public.pem to a JWK (alg=RS384, use=sig, choose a kid such as
#      "openemr-key-001") and wrap it in a JWKS: {"keys":[<jwk>]}.
#   3. In OpenEMR: Administration -> System -> API Clients -> Register New API Client
#        Client Type:           Confidential
#        Grant Types:           Client Credentials
#        Authentication Method: private_key_jwt
#        Scopes:                system/Patient.read, system/Observation.read, ...
#        JSON Web Key Set:      paste the JWKS from step 2
#      Save and copy the generated Client ID, then click Enable.

fhir_server:
  provider: "openemr"

  # Base URL of the OpenEMR FHIR R4 endpoint.
  # Typical pattern: https://<host>/apis/default/fhir
  base_url: "https://your-openemr-instance.com/apis/default/fhir"

  openemr:
    # Client ID generated by OpenEMR when you registered the API client
    client_id: "${OPENEMR_CLIENT_ID}"

    # Path to the RSA private key (PEM) whose matching public key (as JWK)
    # is registered in OpenEMR's JWKS for this client.
    private_key_path: "/path/to/keys/openemr/private.key"

    # OpenEMR token endpoint - must match the JWT `aud` claim exactly.
    token_url: "https://your-openemr-instance.com/oauth2/default/token"

    # JWK kid - must match the `kid` field of the JWK registered in OpenEMR.
    key_id: "openemr-key-001"

    # System-level scopes - must be a subset of what the API client is
    # registered with in OpenEMR. Only system/* scopes are allowed for
    # the client_credentials + private_key_jwt flow.
    scopes:
      - "system/Patient.read"
      - "system/Patient.write"
      - "system/Observation.read"
      - "system/Observation.write"
      - "system/Condition.read"
      - "system/MedicationRequest.read"
      - "system/AllergyIntolerance.read"
      - "system/Encounter.read"
      - "system/Practitioner.read"
      - "system/Organization.read"
      - "system/DocumentReference.read"

  timeout: 30s

mcp:
  name: "LangCare MCP FHIR Server"
  version: "2.4.2"

transport:
  stdio: true
  http:
    enabled: false
    port: 8080

logging:
  level: "info"
  format: "json"
  scrub_phi: true

security:
  # Required when http transport is enabled. Comma-separated tokens, or
  # set the MCP_AUTH_TOKENS env var instead.
  mcp_auth_tokens: "${MCP_AUTH_TOKENS}"
  rate_limit:
    enabled: true
    rate: 100
    burst: 200
